<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Knowledge Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f17;
      color: #e2e2f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a3e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 12px; color: #6b6b8a; margin-top: 2px; }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #1a1a2e;
      border-right: 1px solid #2a2a3e;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    .sidebar h2 { font-size: 13px; color: #6b6b8a; text-transform: uppercase; letter-spacing: 0.08em; }

    .upload-zone {
      border: 2px dashed #3d3880;
      border-radius: 8px;
      padding: 24px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .upload-zone:hover { border-color: #6c63ff; background: rgba(108,99,255,0.05); }
    .upload-zone p { font-size: 13px; color: #6b6b8a; margin-top: 8px; }
    .upload-zone span { color: #6c63ff; }

    #file-input { display: none; }

    #status {
      font-size: 12px;
      color: #22c55e;
      min-height: 18px;
      text-align: center;
    }

    #file-list { font-size: 12px; color: #6b6b8a; line-height: 2; }

    /* Chat */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: #6b6b8a;
    }

    .empty-state div:first-child { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 2; }

    .msg { display: flex; flex-direction: column; max-width: 75%; }
    .msg.user { align-self: flex-end; }
    .msg.ai { align-self: flex-start; }

    .msg-label {
      font-size: 10px;
      color: #6b6b8a;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .msg.user .msg-label { text-align: right; }

    .bubble {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .msg.user .bubble { background: #3d3880; border-bottom-right-radius: 3px; }
    .msg.ai .bubble { background: #1a1a2e; border: 1px solid #2a2a3e; border-bottom-left-radius: 3px; }
    .msg.error .bubble { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }

    .input-bar {
      padding: 16px 20px;
      border-top: 1px solid #2a2a3e;
      background: #1a1a2e;
      display: flex;
      gap: 10px;
    }

    #question-input {
      flex: 1;
      background: #0f0f17;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e2f0;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      resize: none;
    }

    #question-input:focus { border-color: #6c63ff; }

    #ask-btn {
      background: #6c63ff;
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #ask-btn:hover { opacity: 0.85; }
    #ask-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <header>
    <div style="font-size:28px">🧠</div>
    <div>
      <h1>Knowledge Assistant</h1>
      <p>Answers grounded in your documents only</p>
    </div>
  </header>

  <div class="main">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>Documents</h2>

      <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <div style="font-size:28px">📄</div>
        <p>Drop PDFs here or <span>click to upload</span></p>
        <input type="file" id="file-input" accept=".pdf" multiple />
      </div>

      <div id="status"></div>
      <div id="file-list"></div>
    </div>

    <!-- Chat -->
    <div class="chat">
      <div id="messages">
        <div class="empty-state">
          <div>🔍</div>
          <p>Upload a document on the left<br/>then ask questions below</p>
        </div>
      </div>

      <div class="input-bar">
        <textarea
          id="question-input"
          rows="1"
          placeholder="Ask a question about your documents..."
        ></textarea>
        <button id="ask-btn">Ask →</button>
      </div>
    </div>

  </div>

  <script>
    const fileInput = document.getElementById("file-input");
    const status = document.getElementById("status");
    const fileList = document.getElementById("file-list");
    const messagesDiv = document.getElementById("messages");
    const questionInput = document.getElementById("question-input");
    const askBtn = document.getElementById("ask-btn");

    // Upload files
    fileInput.addEventListener("change", async () => {
      const files = fileInput.files;
      if (!files.length) return;

      status.textContent = "Uploading and indexing...";
      status.style.color = "#f59e0b";

      const formData = new FormData();
      for (const file of files) formData.append("files", file);

      try {
        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();
        status.textContent = "✓ " + data.message;
        status.style.color = "#22c55e";

        fileList.innerHTML = Array.from(files)
          .map(f => `📕 ${f.name}`)
          .join("<br/>");
      } catch (err) {
        status.textContent = "Upload failed.";
        status.style.color = "#ef4444";
      }
    });

    // Add message to chat
    function addMessage(role, text) {
      const empty = document.querySelector(".empty-state");
      if (empty) empty.remove();

      const msg = document.createElement("div");
      msg.className = `msg ${role}`;
      msg.innerHTML = `
        <div class="msg-label">${role === "user" ? "You" : role === "error" ? "System" : "Assistant"}</div>
        <div class="bubble">${text}</div>
      `;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Ask question
    askBtn.addEventListener("click", async () => {
      const question = questionInput.value.trim();
      if (!question) return;

      addMessage("user", question);
      questionInput.value = "";
      askBtn.disabled = true;
      askBtn.textContent = "...";

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();

        if (data.error) addMessage("error", data.error);
        else addMessage("ai", data.answer);
      } catch (err) {
        addMessage("error", "Something went wrong. Is the server running?");
      } finally {
        askBtn.disabled = false;
        askBtn.textContent = "Ask →";
      }
    });

    // Enter key to send
    questionInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        askBtn.click();
      }
    });
  </script>

</body>
</html>
